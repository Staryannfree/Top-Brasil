<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --primary: #f59e0b;
      --bg: #111827;
      --card: #1f2937;
      --text: #f3f4f6;
    }
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      border-bottom: 1px solid #374151;
      padding-bottom: 12px;
    }
    .logo {
      width: 32px;
      height: 32px;
      background: var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #000;
    }
    h2 {
      font-size: 16px;
      margin: 0;
      color: var(--text);
    }
    .status-card {
      background: var(--card);
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      animation: fadeIn 0.3s ease;
    }
    .label {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 4px;
    }
    .value {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .btn {
      width: 100%;
      background: var(--primary);
      color: #000;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }
    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      filter: brightness(1.1);
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
    }
    .btn:disabled {
      background: #4b5563;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid #374151;
      color: var(--text);
      margin-top: 8px;
    }
    .log-area {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      background: #000;
      padding: 10px;
      border-radius: 6px;
      margin-top: 12px;
      max-height: 100px;
      overflow-y: auto;
      color: #10b981;
      border: 1px solid #1f2937;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">TB</div>
    <h2>PowerCRM Bridge</h2>
  </div>

  <div id="lead-display" class="status-card" style="display: none;">
    <div class="label">Lead Localizado:</div>
    <div id="lead-name" class="value">Carregando...</div>
    <div id="lead-veiculo" class="label">Placa: ---</div>
  </div>

  <button id="btn-sync" class="btn">
    <span>⚡</span> Gerar Cotação (PowerCRM)
  </button>

  <button id="btn-refresh" class="btn btn-secondary">
    <span>🔄</span> Buscar Lead Pendente
  </button>

  <div id="log" class="log-area">Aguardando comando...</div>

  <script src="popup.js"></script>
</body>
</html>
